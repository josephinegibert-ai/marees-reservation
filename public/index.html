<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Réservation pêcherie</title>

<style>
.calendar-header button {
    font-size: 24px;      /* taille de la flèche */
    padding: 10px 16px;   /* taille du bouton */
    border-radius: 10px;
    border: none;
    cursor: pointer;
    background: #1565c0;
    color: white;
}

body {
    font-size: 18px; /* taille globale */
}

.calendar-header button:hover {
    background: #0d47a1;
    transform: scale(1.1);
}

body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #dfefff, #f7fbff);
}

/* HEADER */
.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 40px;
}

h1 {
    color: #0d47a1;
}

.admin-btn {
    background: linear-gradient(135deg, #1565c0, #1e88e5);
    color: white;
    border: none;
    padding: 10px 16px;
    border-radius: 10px;
    cursor: pointer;
}

/* LAYOUT */
.container {
    display: flex;
    flex-direction: column;   /* empile les blocs */
    align-items: center;      /* centre horizontalement */
    gap: 20px;
    padding: 20px;
}

.left, .right {
    width: 100%;
    max-width: 900px;   /* largeur max centrée */
}

/* CARDS */
.card {
    background: white;
    border-radius: 20px;
    padding: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

/* COLONNES */
.left { flex: 1.5; }
.right { flex: 1; }

/* CALENDRIER */
.calendar-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.calendar {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 10px;
    margin-top: 10px;
}

h1 {
    color: #0d47a1;
    text-align: center;
    width: 100%;
}

.day {
    padding: 12px;
    border-radius: 10px;
    background: #e3f2fd;
    cursor: pointer;
    text-align: center;
    transition: 0.2s;
}

.selectedDay {
    border: 3px solid #2196f3;
    box-sizing: border-box;
}

.weekday {
    font-size: 14px;
    color: #555;
    margin-top: 4px;
}

.day:hover {
    transform: scale(1.05);
    background: #bbdefb;
}

.selected {
    background: #1565c0;
    color: white;
}

/* PANEL */
.panel {
    margin-top: 20px;
    padding: 15px;
    border-radius: 15px;
    background: #f4f9ff;
}

#slots button {
    padding: 12px;
    border: none;
    border-radius: 10px;
    margin: 5px;
    cursor: pointer;
    color: white;
    font-weight: bold;
}

.slotBtn {
    background: #2196f3;
    color: white;
    border: none;
    padding: 14px 20px;
    margin: 5px;
    font-size: 16px;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
}

.slotBtn:hover {
    background: #1976d2;
}

.slotBtn:disabled {
    background: #ccc !important;
    cursor: not-allowed;
}

.matin { background: linear-gradient(135deg, #43a047, #66bb6a); }
.aprem { background: linear-gradient(135deg, #1e88e5, #42a5f5); }

.selectedSlot {
    outline: 3px solid #0d47a1;
}

input {
    padding: 14px;
    margin: 8px;
    width: 48%;
    border-radius: 10px;
    border: 1px solid #ccc;
    font-size: 16px;
}

.reserve-btn {
    margin-top: 15px;
    width: 100%;
    padding: 16px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(135deg, #0d47a1, #1976d2);
    color: white;
    font-size: 18px;
    cursor: pointer;
}

/* TABLE MARÉES */
table {
    width: 100%;
    border-collapse: collapse;
}

th {
    background: #1565c0;
    color: white;
}

th, td {
    padding: 6px;
    text-align: center;
    border-bottom: 1px solid #ddd;
}

/* GROS COEFF */
.bigCoef {
    background: #0d47a1;
    color: white;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="header">
    <h1>Réservation Pêcherie</h1>
    <button class="admin-btn" onclick="window.location.href='admin.html'">Administrateur</button>
</div>

<div class="container">

    <!-- GAUCHE -->
    <div class="left card">

        <div class="calendar-header">
            <button onclick="prevMonth()">⬅</button>
            <h2 id="monthTitle"></h2>
            <button onclick="nextMonth()">➡</button>
        </div>

        <div id="calendar" class="calendar"></div>

        <div class="panel">
            <h3 id="selectedDate"></h3>

            <div id="slots"></div>

            <div>
                <input id="prenom" placeholder="Prénom">
                <input id="nom" placeholder="Nom">
            </div>

            <button class="reserve-btn" onclick="reserver()">Réserver ce créneau</button>
        </div>

    </div>

    <!-- DROITE -->
    <div class="right card">

	<h3 id="mareeTitle"> Marées</h3>

        <table>
            <thead>
                <tr>
                    <th>Jour</th>
                    <th>Pleine Mer Matin</th>
                    <th>Coef</th>
                    <th>Pleine Mer Soir</th>
                    <th>Coef</th>
                    <th>Basse Mer Matin</th>
                    <th>Basse Mer Soir</th>
                </tr>
            </thead>

            <tbody id="mareesTable"></tbody>

        </table>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
