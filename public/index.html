<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Réservation pêcherie</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            padding: 20px;
        }

        #reservation {
            margin-top: 20px;
        }

        input, select {
            display: block;
            margin: 10px auto;
            padding: 8px;
            width: 200px;
        }

        button {
            padding: 10px 20px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h1>Réservation pêcherie</h1>

    <div id="reservation">
        <h3>Réserver un créneau</h3>

        <label>Date :</label>
        <input type="date" id="date">

        <label>Créneau :</label>
        <select id="creneau">
            <option value="matin">Matin</option>
            <option value="apres-midi">Après-midi</option>
        </select>

        <input type="text" id="nom" placeholder="Nom">
        <input type="text" id="prenom" placeholder="Prénom">

        <button onclick="reserver()">Réserver</button>
    </div>

    <script>
        function reserver() {
            const date = document.getElementById("date").value;
            const creneau = document.getElementById("creneau").value;
            const nom = document.getElementById("nom").value;
            const prenom = document.getElementById("prenom").value;

            if (!date || !nom || !prenom) {
                alert("Merci de remplir tous les champs");
                return;
            }

            fetch("/reservation", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    date,
                    creneau,
                    nom,
                    prenom
                })
            })
            .then(res => res.json())
            .then(data => {
                if (data.error) {
                    alert(data.error);
                } else {
                    alert("Réservation enregistrée !");
                }
            })
            .catch(() => {
                alert("Erreur serveur");
            });
        }
    </script>

</body>
</html>
